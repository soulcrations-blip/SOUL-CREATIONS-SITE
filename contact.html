<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Contact – Soul Creations</title>
    <link rel="icon" type="image/png" href="assets/images/logo-white-sq.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@studio-freight/lenis@1.0.42/dist/lenis.min.js"></script>
    <link rel="stylesheet" href="assets/css/style.css">
    <style>
        .social-icon {
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 80px;
            height: 80px;
            background: rgba(255,255,255,0.05);
            border-radius: 9999px;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.2);
        }
        .social-icon:hover {
            transform: translateY(-8px) scale(1.05);
            background: linear-gradient(135deg, #ff7e5e, #feb47b);
            border-color: transparent;
        }
        .social-icon:hover svg {
            stroke: #000;
            fill: #000;
        }
        .gradient-text {
            background: linear-gradient(135deg, #ff7e5e, #feb47b);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
    </style>
</head>
<body class="bg-black text-white font-['Inter'] overflow-x-hidden">

    <!-- LOADER, GRAIN, MOUSE, NAVBAR (active Contact) -->
    <div id="loader" class="fixed inset-0 z-50 bg-black flex flex-col items-center justify-center">
        <img src="assets/images/logo-white-hz.png" alt="Soul Creations" class="w-48 md:w-64 opacity-0" id="loader-logo" onerror="this.style.display='none'; this.parentElement.innerHTML='<div class=text-2xl>SOUL CREATIONS</div>'">
        <div class="mt-8 w-16 h-px bg-white/30 overflow-hidden"><div class="w-full h-full bg-white origin-left" id="loader-line"></div></div>
    </div>
    <div class="grain-overlay fixed inset-0 pointer-events-none z-40 opacity-20"></div>
    <div class="mouse-follower fixed w-8 h-8 rounded-full border border-white/40 pointer-events-none z-50 hidden md:block backdrop-blur-sm"></div>
    <header class="fixed top-0 left-0 w-full z-30 py-4 px-6 md:px-12 transition-all duration-300 bg-black/80 backdrop-blur-md border-b border-white/10">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <a href="index.html"><img src="assets/images/logo-white-hz.png" alt="Soul Creations" class="h-8 md:h-10" onerror="this.style.display='none'; this.parentElement.innerHTML='SOUL CREATIONS'"></a>
            <nav class="hidden md:flex space-x-8 text-sm uppercase tracking-wide">
                <a href="index.html">Home</a><a href="projects.html">Projects</a><a href="services.html">Services</a><a href="about.html">About</a><a href="pricing.html">Pricing</a><a href="albums.html">Albums</a><a href="contact.html" class="border-b border-white">Contact</a>
            </nav>
            <a href="contact.html" class="hidden md:block px-5 py-2 border border-white/40 rounded-full text-sm hover:bg-white hover:text-black">Book Now</a>
            <button id="menu-btn" class="md:hidden text-white"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg></button>
        </div>
        <div id="mobile-menu" class="fixed top-0 left-0 w-full h-screen bg-black z-40 transform -translate-y-full transition-transform duration-500 flex flex-col items-center justify-center space-y-8 text-2xl"><!-- links --></div>
    </header>

    <main class="pt-32 pb-20 px-6">
        <div class="max-w-4xl mx-auto text-center">
            <h1 class="text-6xl md:text-7xl font-light mb-6 reveal-up gradient-text">Let's Connect</h1>
            <p class="text-white/70 text-lg mb-12 reveal-up">Reach out through any platform — we respond within 24 hours.</p>

            <!-- Big social media icons only (no direct contact text) -->
            <div class="flex flex-wrap justify-center gap-8 mb-16 reveal">
                <!-- Instagram -->
                <a href="https://www.instagram.com/soulc.lk" target="_blank" class="social-icon group">
                    <svg class="w-8 h-8 text-white group-hover:text-black transition" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 8a4 4 0 100 8 4 4 0 000-8zm0 0a4 4 0 100 8 4 4 0 000-8zM4 6a2 2 0 012-2h12a2 2 0 012 2v12a2 2 0 01-2 2H6a2 2 0 01-2-2V6z"/></svg>
                </a>
                <!-- Facebook -->
                <a href="https://web.facebook.com/61572908655565" target="_blank" class="social-icon group">
                    <svg class="w-8 h-8 text-white group-hover:text-black transition" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M13 18h-3v-8h-2v-2h2v-2c0-2.2 1.8-4 4-4h2v3h-2c-1.1 0-2 .9-2 2v3h4v2h-4v8z"/></svg>
                </a>
                <!-- WhatsApp -->
                <a href="https://wa.me/94712049140" target="_blank" class="social-icon group">
                    <svg class="w-8 h-8 text-white group-hover:text-black transition" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 2C6.5 2 2 6.5 2 12c0 2.2.7 4.3 2 6l-1 3 3-1c1.7 1.3 3.8 2 6 2 5.5 0 10-4.5 10-10S17.5 2 12 2z"/><path d="M12 16.5c-2.5 0-4.5-2-4.5-4.5s2-4.5 4.5-4.5 4.5 2 4.5 4.5-2 4.5-4.5 4.5z"/></svg>
                </a>
                <!-- Email -->
                <a href="mailto:soulcrations@gmail.com" class="social-icon group">
                    <svg class="w-8 h-8 text-white group-hover:text-black transition" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M22 6L12 13 2 6m20 0v12a2 2 0 01-2 2H4a2 2 0 01-2-2V6m20 0l-8 7-8-7"/></svg>
                </a>
            </div>

            <!-- Terms & Conditions link -->
            <div class="mt-8 text-white/50 text-sm">
                <p>By contacting us, you agree to our <a href="terms.html" class="text-orange-400 hover:underline">Terms & Conditions</a>.</p>
            </div>

            <!-- Optional quick contact form (small, below icons) -->
            <div class="max-w-md mx-auto mt-16">
                <h3 class="text-xl font-light mb-4">Or send a quick message</h3>
                <form id="contactFormQuick" class="space-y-4">
                    <input type="text" placeholder="Your name" required class="w-full bg-white/10 border border-white/20 rounded-full px-5 py-3 focus:outline-none focus:border-orange-400">
                    <input type="email" placeholder="Email" required class="w-full bg-white/10 border border-white/20 rounded-full px-5 py-3 focus:outline-none focus:border-orange-400">
                    <textarea rows="3" placeholder="Your message..." required class="w-full bg-white/10 border border-white/20 rounded-2xl px-5 py-3 focus:outline-none focus:border-orange-400"></textarea>
                    <button type="submit" class="w-full bg-gradient-to-r from-orange-500 to-red-500 py-3 rounded-full font-bold hover:scale-[1.02] transition">Send Message →</button>
                </form>
                <p class="text-white/40 text-xs mt-4">We'll get back to you within 24 hours.</p>
            </div>
        </div>
    </main>

    <footer class="py-8 text-center text-white/40 text-sm border-t border-white/10">© 2025 Soul Creations Sri Lanka</footer>
    <script src="assets/js/main.js"></script>
    <script>
        document.getElementById('contactFormQuick')?.addEventListener('submit', (e) => {
            e.preventDefault();
            alert('✓ Message sent! We will contact you soon.');
            e.target.reset();
        });
    </script>
</body>
</html>
